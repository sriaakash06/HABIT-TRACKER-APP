<!DOCTYPE html>

<style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body min-h-screen pb-32">
<!-- Top AppBar (Back Action Context - Shell Suppressed) -->
<nav class="flex justify-between items-center px-6 py-6 w-full sticky top-0 bg-background/80 backdrop-blur-md z-40">
<button class="w-12 h-12 flex items-center justify-center rounded-full hover:bg-surface-container transition-colors active:scale-90 duration-150">
<span class="material-symbols-outlined text-on-surface text-2xl" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-headline font-extrabold text-xl tracking-tight text-on-surface">New Habit</h1>
<div class="w-12"></div> <!-- Spacer for symmetry -->
</nav>
<main class="max-w-xl mx-auto px-6 space-y-8 mt-4">
<!-- Emoji Selection Area -->
<section class="space-y-4">
<label class="font-headline font-bold text-sm uppercase tracking-widest text-on-surface-variant px-1">Choose Icon</label>
<div class="flex gap-4 overflow-x-auto no-scrollbar py-2 -mx-2 px-2">
<div class="flex-shrink-0 w-16 h-16 flex items-center justify-center bg-primary/10 text-3xl rounded-lg border-2 border-primary">🔥</div>
<div class="flex-shrink-0 w-16 h-16 flex items-center justify-center bg-surface-container text-3xl rounded-lg hover:bg-surface-container-highest transition-colors cursor-pointer">💧</div>
<div class="flex-shrink-0 w-16 h-16 flex items-center justify-center bg-surface-container text-3xl rounded-lg hover:bg-surface-container-highest transition-colors cursor-pointer">🏃</div>
<div class="flex-shrink-0 w-16 h-16 flex items-center justify-center bg-surface-container text-3xl rounded-lg hover:bg-surface-container-highest transition-colors cursor-pointer">📚</div>
<div class="flex-shrink-0 w-16 h-16 flex items-center justify-center bg-surface-container text-3xl rounded-lg hover:bg-surface-container-highest transition-colors cursor-pointer">🧘</div>
<div class="flex-shrink-0 w-16 h-16 flex items-center justify-center bg-surface-container text-3xl rounded-lg hover:bg-surface-container-highest transition-colors cursor-pointer">🌱</div>
<div class="flex-shrink-0 w-16 h-16 flex items-center justify-center bg-surface-container text-3xl rounded-lg hover:bg-surface-container-highest transition-colors cursor-pointer">🍎</div>
<div class="flex-shrink-0 w-16 h-16 flex items-center justify-center bg-surface-container text-3xl rounded-lg hover:bg-surface-container-highest transition-colors cursor-pointer">💤</div>
<div class="flex-shrink-0 w-16 h-16 flex items-center justify-center bg-surface-container text-3xl rounded-lg hover:bg-surface-container-highest transition-colors cursor-pointer">🎨</div>
</div>
</section>
<!-- Habit Name Input -->
<section class="space-y-4">
<label class="font-headline font-bold text-sm uppercase tracking-widest text-on-surface-variant px-1" for="habit-name">Habit Name</label>
<input class="w-full h-20 px-6 bg-surface-container-high border-none rounded-lg font-headline text-2xl font-semibold placeholder:text-outline focus:ring-2 focus:ring-primary focus:bg-surface-container-lowest transition-all" id="habit-name" placeholder="E.g. Morning Meditation" type="text"/>
</section>
<!-- Color Selector -->
<section class="space-y-4">
<label class="font-headline font-bold text-sm uppercase tracking-widest text-on-surface-variant px-1">Theme Color</label>
<div class="flex flex-wrap gap-4 justify-between">
<button class="w-10 h-10 rounded-full bg-primary ring-4 ring-primary/20 ring-offset-4 ring-offset-background"></button>
<button class="w-10 h-10 rounded-full bg-secondary"></button>
<button class="w-10 h-10 rounded-full bg-tertiary"></button>
<button class="w-10 h-10 rounded-full bg-orange-400"></button>
<button class="w-10 h-10 rounded-full bg-pink-400"></button>
<button class="w-10 h-10 rounded-full bg-sky-400"></button>
<button class="w-10 h-10 rounded-full bg-amber-400"></button>
<button class="w-10 h-10 rounded-full bg-indigo-400"></button>
</div>
</section>
<!-- Frequency Toggles -->
<section class="space-y-4">
<label class="font-headline font-bold text-sm uppercase tracking-widest text-on-surface-variant px-1">Frequency</label>
<div class="flex p-1.5 bg-surface-container rounded-full w-full">
<button class="flex-1 py-3 text-sm font-semibold rounded-full bg-surface-container-lowest shadow-sm text-on-surface">Daily</button>
<button class="flex-1 py-3 text-sm font-semibold rounded-full text-on-surface-variant hover:text-on-surface">Weekly</button>
<button class="flex-1 py-3 text-sm font-semibold rounded-full text-on-surface-variant hover:text-on-surface">Custom</button>
</div>
</section>
<!-- Day Selector -->
<section class="space-y-4">
<div class="flex justify-between">
<button class="w-11 h-11 flex items-center justify-center rounded-full bg-primary text-on-primary font-bold shadow-lg shadow-primary/20">M</button>
<button class="w-11 h-11 flex items-center justify-center rounded-full bg-primary text-on-primary font-bold shadow-lg shadow-primary/20">T</button>
<button class="w-11 h-11 flex items-center justify-center rounded-full bg-primary text-on-primary font-bold shadow-lg shadow-primary/20">W</button>
<button class="w-11 h-11 flex items-center justify-center rounded-full bg-primary text-on-primary font-bold shadow-lg shadow-primary/20">T</button>
<button class="w-11 h-11 flex items-center justify-center rounded-full bg-primary text-on-primary font-bold shadow-lg shadow-primary/20">F</button>
<button class="w-11 h-11 flex items-center justify-center rounded-full bg-surface-container-high text-on-surface-variant font-bold">S</button>
<button class="w-11 h-11 flex items-center justify-center rounded-full bg-surface-container-high text-on-surface-variant font-bold">S</button>
</div>
</section>
<!-- Reminder Time -->
<section class="p-6 bg-surface-container-low rounded-lg flex items-center justify-between">
<div class="flex items-center gap-4">
<div class="w-12 h-12 bg-secondary/10 rounded-full flex items-center justify-center text-secondary">
<span class="material-symbols-outlined" data-icon="notifications">notifications</span>
</div>
<div>
<h4 class="font-bold text-on-surface">Daily Reminder</h4>
<p class="text-sm text-on-surface-variant">Get a nudge to stay on track</p>
</div>
</div>
<div class="flex items-center gap-2 bg-surface-container-highest px-4 py-2 rounded-full">
<span class="font-bold text-on-surface">08:00</span>
<span class="text-xs font-bold text-on-surface-variant">AM</span>
</div>
</section>
<!-- Asymmetric Detail Card -->
<section class="relative h-48 rounded-lg overflow-hidden group">
<img alt="" class="w-full h-full object-cover" data-alt="Calm morning scene with soft sunlight hitting a yoga mat and a plant in a warm minimalist room" src="https://lh3.googleusercontent.com/aida-public/AB6AXuB18L4bPFKWXUjhboTGVpa3FZkezoACrCIYGLc834s9iD_s7Uj4vDCmQlswsmF0aOzMNceVyHq7kSxiCJeIBsP7tl7m9rbdZ4SzXNzLR_n00OcS5XIdLBSECUJd0azVFqdJfYKRpdO75inFz0_vJb2E8b1c9KPffUgm-vhH__PTf3sB7hGJDL8UHF4JFBJNj553tJtB0fREbIHynzrCuBux9-jM9PfvGPKCRG6P7xi23gmCQbcHMbsM6635-xePvj1yT_d6z9cyuDM"/>
<div class="absolute inset-0 bg-gradient-to-t from-primary-dim/80 to-transparent flex items-end p-8">
<div class="text-on-primary">
<p class="text-sm font-label uppercase tracking-widest opacity-80">Pro Tip</p>
<h3 class="text-xl font-headline font-bold">Consistent mornings lead to 80% higher success rates.</h3>
</div>
</div>
</section>
</main>
<!-- Fixed Action Button (Shell Logic: suppressed, custom CTA used for linear flow) -->
<div class="fixed bottom-0 left-0 right-0 p-6 bg-background/80 backdrop-blur-xl z-50 flex flex-col gap-4">
<button class="w-full py-5 bg-primary text-on-primary font-headline font-extrabold text-lg rounded-full shadow-2xl shadow-primary/30 active:scale-[0.98] transition-all flex items-center justify-center gap-3">
<span>Create Habit</span>
<span class="material-symbols-outlined" data-icon="rocket_launch">rocket_launch</span>
</button>
</div>
</body></html>
